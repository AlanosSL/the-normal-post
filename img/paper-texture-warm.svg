<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="6" seed="9" stitchTiles="stitch" result="fine"/>
      <feColorMatrix type="saturate" values="0" in="fine" result="grey"/>
      <feComponentTransfer in="grey" result="grain">
        <feFuncA type="linear" slope="0.2" intercept="0"/>
      </feComponentTransfer>
    </filter>

    <filter id="fibers" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.12" numOctaves="3" seed="22" stitchTiles="stitch" result="fib"/>
      <feColorMatrix type="saturate" values="0" in="fib" result="grey2"/>
      <feComponentTransfer in="grey2" result="fibers">
        <feFuncA type="linear" slope="0.07" intercept="0"/>
      </feComponentTransfer>
    </filter>

    <filter id="stains" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006" numOctaves="2" seed="31" stitchTiles="stitch" result="cloud"/>
      <feColorMatrix type="saturate" values="0" in="cloud" result="grey3"/>
      <feComponentTransfer in="grey3" result="stains">
        <feFuncA type="linear" slope="0.1" intercept="0"/>
      </feComponentTransfer>
    </filter>

    <filter id="emboss" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="4" seed="5" stitchTiles="stitch" result="bump"/>
      <feDiffuseLighting in="bump" lighting-color="#FFF5E0" surfaceScale="1.5" diffuseConstant="0.7" result="light">
        <feDistantLight azimuth="210" elevation="50"/>
      </feDiffuseLighting>
      <feComposite operator="in" in="light" in2="SourceGraphic" result="emboss"/>
      <feComponentTransfer in="emboss">
        <feFuncA type="linear" slope="0.14" intercept="0"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="800" height="800" fill="#E8D9C2"/>
  <rect width="800" height="800" fill="#D9C5A6" opacity="0.35"/>
  <rect width="800" height="800" fill="#B89B6E" filter="url(#stains)"/>
  <rect width="800" height="800" fill="#7A6548" filter="url(#fibers)"/>
  <rect width="800" height="800" fill="#5C4A35" filter="url(#grain)"/>
  <rect width="800" height="800" fill="#FFFFFF" filter="url(#emboss)"/>
</svg>
